name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ember-pi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ember-pi/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
